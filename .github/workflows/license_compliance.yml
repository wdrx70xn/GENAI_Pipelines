name: License Compliance
'on':
  pull_request:
    paths:
    - '**/pyproject.toml'
  schedule:
  - cron: 0 0 * * *
env:
  CORE_DATADOG_API_KEY: ${{ secrets.CORE_DATADOG_API_KEY }}
jobs:
  license_check_direct:
    name: Direct dependencies only
    env:
      REQUIREMENTS_FILE: requirements_direct.txt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Get direct dependencies, all extras
      run: 'pip install toml

        python .github/utils/pyproject_to_requirements.py pyproject.toml --extra all
        > ${{ env.REQUIREMENTS_FILE }}

        '
    - name: Check Licenses
      id: license_check_report
      uses: pilosus/action-pip-license-checker@v2
      with:
        github-token: ${{ secrets.GH_ACCESS_TOKEN }}
        requirements: ${{ env.REQUIREMENTS_FILE }}
        fail: Copyleft,Other,Error
        exclude: (?i)^(PyMuPDF|tqdm|pinecone-client|psycopg2).*
    - name: Send license report to Fossa
      uses: fossas/fossa-action@v1.3.1
      continue-on-error: true
      with:
        api-key: ${{ secrets.FOSSA_LICENSE_SCAN_TOKEN }}
    - name: Print report
      if: ${{ always() }}
      run: echo "${{ steps.license_check_report.outputs.report }}"
    - name: Calculate alert data
      id: calculator
      shell: bash
      if: (success() || failure())
      run: "if [ \"${{ job.status }}\" = \"success\" ]; then\n  echo \"alert_type=success\"\
        \ >> \"$GITHUB_OUTPUT\";\nelse\n  echo \"alert_type=error\" >> \"$GITHUB_OUTPUT\"\
        ;\nfi\n"
    - name: Send event to Datadog
      if: (success() || failure()) && env.CORE_DATADOG_API_KEY != ''
      uses: masci/datadog@v1
      with:
        api-key: ${{ env.CORE_DATADOG_API_KEY }}
        api-url: https://api.datadoghq.eu
        events: "- title: \"${{ github.job }} in ${{ github.workflow }} workflow\"\
          \n  text: \"License compliance check: direct dependencies only.\"\n  alert_type:\
          \ \"${{ steps.calculator.outputs.alert_type }}\"\n  source_type_name: \"\
          Github\"\n  host: ${{ github.repository_owner }}\n  tags:\n    - \"project:${{\
          \ github.repository }}\"\n    - \"job:${{ github.job }}\"\n    - \"run_id:${{\
          \ github.run_id }}\"\n    - \"workflow:${{ github.workflow }}\"\n    - \"\
          branch:${{ github.ref_name }}\"\n    - \"url:https://github.com/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}\"\n"
  license_check_vanilla:
    name: Core dependencies, no extras
    env:
      REQUIREMENTS_FILE: requirements_vanilla.txt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Get explicit and transitive dependencies
      run: 'pip install .

        pip freeze > ${{ env.REQUIREMENTS_FILE }}

        '
    - name: Check Licenses
      id: license_check_report
      uses: pilosus/action-pip-license-checker@v2
      with:
        github-token: ${{ secrets.GH_ACCESS_TOKEN }}
        requirements: ${{ env.REQUIREMENTS_FILE }}
        fail: Copyleft,Other,Error
        exclude: (?i)^(certifi|num2words|tqdm|nvidia-).*
    - name: Print report
      if: ${{ always() }}
      run: echo "${{ steps.license_check_report.outputs.report }}"
    - name: Calculate alert data
      id: calculator
      shell: bash
      if: (success() || failure())
      run: "if [ \"${{ job.status }}\" = \"success\" ]; then\n  echo \"alert_type=success\"\
        \ >> \"$GITHUB_OUTPUT\";\nelse\n  echo \"alert_type=error\" >> \"$GITHUB_OUTPUT\"\
        ;\nfi\n"
    - name: Send event to Datadog
      if: (success() || failure()) && env.CORE_DATADOG_API_KEY != ''
      uses: masci/datadog@v1
      with:
        api-key: ${{ env.CORE_DATADOG_API_KEY }}
        api-url: https://api.datadoghq.eu
        events: "- title: \"${{ github.job }} in ${{ github.workflow }} workflow\"\
          \n  text: \"License compliance check: core dependencies, no extras.\"\n\
          \  alert_type: \"${{ steps.calculator.outputs.alert_type }}\"\n  source_type_name:\
          \ \"Github\"\n  host: ${{ github.repository_owner }}\n  tags:\n    - \"\
          project:${{ github.repository }}\"\n    - \"job:${{ github.job }}\"\n  \
          \  - \"run_id:${{ github.run_id }}\"\n    - \"workflow:${{ github.workflow\
          \ }}\"\n    - \"branch:${{ github.ref_name }}\"\n    - \"url:https://github.com/${{\
          \ github.repository }}/actions/runs/${{ github.run_id }}\"\n"
  license_check_all:
    name: All extras
    env:
      REQUIREMENTS_FILE: requirements_all.txt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Get explicit and transitive dependencies
      run: 'pip install -U pip

        pip install .[all]

        pip freeze > ${{ env.REQUIREMENTS_FILE }}

        '
    - name: Check Licenses
      id: license_check_report
      uses: pilosus/action-pip-license-checker@v2
      with:
        github-token: ${{ secrets.GH_ACCESS_TOKEN }}
        requirements: ${{ env.REQUIREMENTS_FILE }}
        fail: Copyleft,Other,Error
        exclude: (?i)^(astroid|certifi|chardet|num2words|nvidia-|pathspec|pinecone-client|psycopg2|pylint|PyMuPDF|pyzmq|tqdm).*
    - name: Print report
      if: ${{ always() }}
      run: echo "${{ steps.license_check_report.outputs.report }}"
    - name: Calculate alert data
      id: calculator
      shell: bash
      if: (success() || failure())
      run: "if [ \"${{ job.status }}\" = \"success\" ]; then\n  echo \"alert_type=success\"\
        \ >> \"$GITHUB_OUTPUT\";\nelse\n  echo \"alert_type=error\" >> \"$GITHUB_OUTPUT\"\
        ;\nfi\n"
    - name: Send event to Datadog
      if: (success() || failure()) && env.CORE_DATADOG_API_KEY != ''
      uses: masci/datadog@v1
      with:
        api-key: ${{ env.CORE_DATADOG_API_KEY }}
        api-url: https://api.datadoghq.eu
        events: "- title: \"${{ github.job }} in ${{ github.workflow }} workflow\"\
          \n  text: \"License compliance check: all available extras.\"\n  alert_type:\
          \ \"${{ steps.calculator.outputs.alert_type }}\"\n  source_type_name: \"\
          Github\"\n  host: ${{ github.repository_owner }}\n  tags:\n    - \"project:${{\
          \ github.repository }}\"\n    - \"job:${{ github.job }}\"\n    - \"run_id:${{\
          \ github.run_id }}\"\n    - \"workflow:${{ github.workflow }}\"\n    - \"\
          branch:${{ github.ref_name }}\"\n    - \"url:https://github.com/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}\"\n"
  license_check_all_GPU:
    name: All extras, GPU version
    env:
      REQUIREMENTS_FILE: requirements_all_gpu.txt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Get explicit and transitive dependencies
      run: 'pip install -U pip

        pip install .[all-gpu]

        pip freeze > ${{ env.REQUIREMENTS_FILE }}

        '
    - name: Check Licenses
      id: license_check_report
      uses: pilosus/action-pip-license-checker@v2
      with:
        github-token: ${{ secrets.GH_ACCESS_TOKEN }}
        requirements: ${{ env.REQUIREMENTS_FILE }}
        fail: Copyleft,Other,Error
        exclude: (?i)^(astroid|certifi|chardet|num2words|nvidia-|pathspec|pinecone-client|psycopg2|pylint|PyMuPDF|pyzmq|tqdm).*
    - name: Print report
      if: ${{ always() }}
      run: echo "${{ steps.license_check_report.outputs.report }}"
    - name: Calculate alert data
      id: calculator
      shell: bash
      if: (success() || failure())
      run: "if [ \"${{ job.status }}\" = \"success\" ]; then\n  echo \"alert_type=success\"\
        \ >> \"$GITHUB_OUTPUT\";\nelse\n  echo \"alert_type=error\" >> \"$GITHUB_OUTPUT\"\
        ;\nfi\n"
    - name: Send event to Datadog
      if: (success() || failure()) && env.CORE_DATADOG_API_KEY != ''
      uses: masci/datadog@v1
      with:
        api-key: ${{ env.CORE_DATADOG_API_KEY }}
        api-url: https://api.datadoghq.eu
        events: "- title: \"${{ github.job }} in ${{ github.workflow }} workflow\"\
          \n  text: \"License compliance check: all available extras, GPU version.\"\
          \n  alert_type: \"${{ steps.calculator.outputs.alert_type }}\"\n  source_type_name:\
          \ \"Github\"\n  host: ${{ github.repository_owner }}\n  tags:\n    - \"\
          project:${{ github.repository }}\"\n    - \"job:${{ github.job }}\"\n  \
          \  - \"run_id:${{ github.run_id }}\"\n    - \"workflow:${{ github.workflow\
          \ }}\"\n    - \"branch:${{ github.ref_name }}\"\n    - \"url:https://github.com/${{\
          \ github.repository }}/actions/runs/${{ github.run_id }}\"\n"
